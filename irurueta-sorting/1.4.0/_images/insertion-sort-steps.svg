<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- column index labels -->
  <g font-size="12" fill="#78909c">
    <text x="235" y="22" text-anchor="middle">0</text>
    <text x="315" y="22" text-anchor="middle">1</text>
    <text x="395" y="22" text-anchor="middle">2</text>
    <text x="475" y="22" text-anchor="middle">3</text>
    <text x="555" y="22" text-anchor="middle">4</text>
  </g>

  <!-- row labels -->
  <g font-size="13.5" fill="#455a64">
    <text x="10" y="80">Start</text>
    <text x="10" y="160">Pass j=1</text>
    <text x="10" y="240">Pass j=2</text>
    <text x="10" y="320">Pass j=3</text>
    <text x="10" y="393">Pass j=4</text>
    <text x="10" y="410">(sorted)</text>
  </g>

  <!-- sorted-prefix highlight rectangles (drawn first, behind cells) -->
  <g fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="4,3">
    <rect x="192" y="128" width="166" height="54" rx="8"/>
    <rect x="192" y="208" width="246" height="54" rx="8"/>
    <rect x="192" y="288" width="326" height="54" rx="8"/>
    <rect x="192" y="368" width="406" height="54" rx="8"/>
  </g>

  <!-- helper macro-like repeated groups: row 0 Start -->
  <g font-family="'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" text-anchor="middle">
    <!-- Start row: 5,3,8,1,9 -->
    <g>
      <rect x="200" y="50" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="235" y="82" fill="#263238">5</text>
      <rect x="280" y="50" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="315" y="82" fill="#263238">3</text>
      <rect x="360" y="50" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="395" y="82" fill="#263238">8</text>
      <rect x="440" y="50" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="475" y="82" fill="#263238">1</text>
      <rect x="520" y="50" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="555" y="82" fill="#263238">9</text>
    </g>

    <!-- Pass j=1: 3,5,8,1,9 (3 inserted at index 0) -->
    <g>
      <rect x="200" y="130" width="70" height="50" rx="6" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/>
      <text x="235" y="162" fill="#263238">3</text>
      <rect x="280" y="130" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="315" y="162" fill="#263238">5</text>
      <rect x="360" y="130" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="395" y="162" fill="#263238">8</text>
      <rect x="440" y="130" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="475" y="162" fill="#263238">1</text>
      <rect x="520" y="130" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="555" y="162" fill="#263238">9</text>
    </g>

    <!-- Pass j=2: 3,5,8,1,9 (8 already in place, no shift) -->
    <g>
      <rect x="200" y="210" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="235" y="242" fill="#263238">3</text>
      <rect x="280" y="210" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="315" y="242" fill="#263238">5</text>
      <rect x="360" y="210" width="70" height="50" rx="6" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/>
      <text x="395" y="242" fill="#263238">8</text>
      <rect x="440" y="210" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="475" y="242" fill="#263238">1</text>
      <rect x="520" y="210" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="555" y="242" fill="#263238">9</text>
    </g>

    <!-- Pass j=3: 1,3,5,8,9 (1 inserted at index 0, others shift right) -->
    <g>
      <rect x="200" y="290" width="70" height="50" rx="6" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/>
      <text x="235" y="322" fill="#263238">1</text>
      <rect x="280" y="290" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="315" y="322" fill="#263238">3</text>
      <rect x="360" y="290" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="395" y="322" fill="#263238">5</text>
      <rect x="440" y="290" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="475" y="322" fill="#263238">8</text>
      <rect x="520" y="290" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="555" y="322" fill="#263238">9</text>
    </g>

    <!-- Pass j=4: 1,3,5,8,9 (fully sorted) -->
    <g>
      <rect x="200" y="370" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="235" y="402" fill="#263238">1</text>
      <rect x="280" y="370" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="315" y="402" fill="#263238">3</text>
      <rect x="360" y="370" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="395" y="402" fill="#263238">5</text>
      <rect x="440" y="370" width="70" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
      <text x="475" y="402" fill="#263238">8</text>
      <rect x="520" y="370" width="70" height="50" rx="6" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/>
      <text x="555" y="402" fill="#263238">9</text>
    </g>
  </g>

  <!-- legend -->
  <g font-size="12.5" fill="#546e7a">
    <rect x="200" y="438" width="14" height="14" rx="3" fill="#ffe0b2" stroke="#ef6c00" stroke-width="1.5"/>
    <text x="219" y="449">element just inserted</text>
    <rect x="400" y="438" width="14" height="14" rx="3" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="419" y="449">sorted prefix so far</text>
  </g>
</svg>
