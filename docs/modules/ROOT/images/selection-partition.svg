<svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <defs>
    <marker id="sel-arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#607d8b"/>
    </marker>
  </defs>

  <text x="10" y="60" font-size="13.5" fill="#455a64">select(k=2, arr)</text>
  <text x="10" y="78" font-size="12" fill="#78909c">3rd smallest</text>

  <!-- Row 1: initial array -->
  <g font-family="'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" text-anchor="middle">
    <g fill="#ffffff" stroke="#455a64" stroke-width="1.5">
      <rect x="115" y="34" width="70" height="56" rx="6"/>
      <rect x="195" y="34" width="70" height="56" rx="6"/>
      <rect x="275" y="34" width="70" height="56" rx="6"/>
      <rect x="355" y="34" width="70" height="56" rx="6"/>
      <rect x="435" y="34" width="70" height="56" rx="6"/>
      <rect x="515" y="34" width="70" height="56" rx="6"/>
      <rect x="595" y="34" width="70" height="56" rx="6"/>
    </g>
    <g fill="#263238">
      <text x="150" y="68">5</text>
      <text x="230" y="68">3</text>
      <text x="310" y="68">8</text>
      <text x="390" y="68">1</text>
      <text x="470" y="68">9</text>
      <text x="550" y="68">2</text>
      <text x="630" y="68">7</text>
    </g>
  </g>

  <!-- Row 2: partitioned around the same median-of-three pivot as Quicksort -->
  <text x="10" y="182" font-size="13.5" fill="#455a64">Partitioned</text>
  <text x="10" y="200" font-size="12" fill="#78909c">around pivot</text>

  <g font-family="'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" text-anchor="middle">
    <g>
      <rect x="115" y="156" width="70" height="56" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
      <rect x="195" y="156" width="70" height="56" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
      <rect x="275" y="156" width="70" height="56" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
      <rect x="355" y="156" width="70" height="56" rx="6" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2.5"/>
      <rect x="435" y="156" width="70" height="56" rx="6" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/>
      <rect x="515" y="156" width="70" height="56" rx="6" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/>
      <rect x="595" y="156" width="70" height="56" rx="6" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/>
    </g>
    <g fill="#263238">
      <text x="150" y="190">1</text>
      <text x="230" y="190">3</text>
      <text x="310" y="190">2</text>
      <text x="390" y="190">5</text>
      <text x="470" y="190" fill="#90a4ae">9</text>
      <text x="550" y="190" fill="#90a4ae">8</text>
      <text x="630" y="190" fill="#90a4ae">7</text>
    </g>
  </g>
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" text-anchor="middle">
    <text x="230" y="230" fill="#1565c0">contains k = 2</text>
    <text x="390" y="230" fill="#ef6c00">rank 3, not k</text>
    <text x="550" y="230" fill="#90a4ae">all &#8805; pivot, unneeded</text>
  </g>

  <!-- single recursion arrow: only the side containing k is kept -->
  <path d="M230,215 L230,260" stroke="#607d8b" stroke-width="1.5" marker-end="url(#sel-arrow)" fill="none"/>

  <rect x="130" y="268" width="200" height="66" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="230" y="292" text-anchor="middle" font-size="12.5" fill="#1565c0">select() keeps narrowing</text>
  <text x="230" y="308" text-anchor="middle" font-size="12.5" fill="#1565c0">only this partition</text>
  <text x="230" y="326" text-anchor="middle" font-size="14" font-family="'SFMono-Regular', Menlo, Consolas, monospace" fill="#263238">[1, 3, 2]</text>

  <rect x="450" y="268" width="200" height="66" rx="8" fill="#eceff1" stroke="#b0bec5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="550" y="298" text-anchor="middle" font-size="12.5" fill="#78909c">discarded — cannot</text>
  <text x="550" y="315" text-anchor="middle" font-size="12.5" fill="#78909c">contain the k-th element</text>

  <text x="390" y="380" text-anchor="middle" font-size="12.5" fill="#78909c">Unlike Quicksort, select() recurses into only one partition, which is what makes it run in O(N).</text>
</svg>
