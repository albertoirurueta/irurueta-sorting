<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="heap-dash-arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#90a4ae"/>
    </marker>
  </defs>

  <!-- edges: solid where both nodes are shown -->
  <g stroke="#455a64" stroke-width="1.5" fill="none">
    <line x1="380" y1="55" x2="230" y2="115"/>
    <line x1="380" y1="55" x2="530" y2="115"/>
    <line x1="210" y1="138" x2="140" y2="195"/>
    <line x1="210" y1="138" x2="300" y2="195"/>
    <line x1="550" y1="138" x2="460" y2="195"/>
    <line x1="140" y1="218" x2="100" y2="275"/>
    <line x1="140" y1="218" x2="180" y2="275"/>
    <line x1="300" y1="218" x2="260" y2="275"/>
    <line x1="300" y1="218" x2="340" y2="275"/>
    <line x1="460" y1="218" x2="440" y2="275"/>
  </g>

  <!-- dashed stubs: implied but unlabeled descendants -->
  <g stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#heap-dash-arrow)">
    <line x1="460" y1="218" x2="520" y2="270"/>
    <line x1="620" y1="218" x2="570" y2="270"/>
    <line x1="620" y1="218" x2="660" y2="270"/>
  </g>

  <!-- level 0 -->
  <circle cx="380" cy="40" r="22" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="380" y="46" text-anchor="middle" font-size="15" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8320;</text>

  <!-- level 1 -->
  <circle cx="220" cy="128" r="22" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="220" y="134" text-anchor="middle" font-size="15" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8321;</text>
  <circle cx="540" cy="128" r="22" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="540" y="134" text-anchor="middle" font-size="15" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8322;</text>

  <!-- level 2 -->
  <circle cx="140" cy="208" r="22" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="140" y="214" text-anchor="middle" font-size="15" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8323;</text>
  <circle cx="300" cy="208" r="22" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="300" y="214" text-anchor="middle" font-size="15" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8324;</text>
  <circle cx="460" cy="208" r="22" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="460" y="214" text-anchor="middle" font-size="15" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8325;</text>
  <circle cx="620" cy="208" r="22" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="620" y="214" text-anchor="middle" font-size="15" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8326;</text>

  <!-- level 3 -->
  <circle cx="100" cy="288" r="20" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="100" y="294" text-anchor="middle" font-size="14" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8327;</text>
  <circle cx="180" cy="288" r="20" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="180" y="294" text-anchor="middle" font-size="14" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8328;</text>
  <circle cx="260" cy="288" r="20" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="260" y="294" text-anchor="middle" font-size="14" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8329;</text>
  <circle cx="340" cy="288" r="20" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="340" y="294" text-anchor="middle" font-size="13" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8321;&#8320;</text>
  <circle cx="440" cy="288" r="20" fill="#ffffff" stroke="#455a64" stroke-width="1.5"/>
  <text x="440" y="294" text-anchor="middle" font-size="13" fill="#263238" font-family="'SFMono-Regular', Menlo, Consolas, monospace">a&#8321;&#8321;</text>

  <!-- legend -->
  <g font-size="12.5" fill="#546e7a">
    <line x1="60" y1="322" x2="90" y2="322" stroke="#455a64" stroke-width="1.5"/>
    <text x="96" y="326">ordered with respect to one another</text>
    <line x1="360" y1="322" x2="390" y2="322" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="396" y="326">unlabeled descendants, continuing the same way</text>
  </g>
</svg>
