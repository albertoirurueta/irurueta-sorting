<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- row labels -->
  <g font-size="13" fill="#455a64">
    <text x="10" y="55">Start</text>
    <text x="10" y="71" font-size="11.5" fill="#78909c">(groups of stride 4)</text>
    <text x="10" y="175">Increment 4</text>
    <text x="10" y="295">Increment 1</text>
    <text x="10" y="311" font-size="11.5" fill="#78909c">(sorted)</text>
  </g>

  <!-- sorted highlight behind final row -->
  <rect x="112" y="278" width="700" height="60" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <g font-family="'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" text-anchor="middle">

    <!-- Row 1: Start, reverse order, stroke colored by index mod 4 -->
    <g stroke-width="2.5" fill="#ffffff">
      <rect x="120" y="30" width="58" height="56" rx="6" stroke="#1565c0"/>
      <rect x="186" y="30" width="58" height="56" rx="6" stroke="#6a1b9a"/>
      <rect x="252" y="30" width="58" height="56" rx="6" stroke="#00838f"/>
      <rect x="318" y="30" width="58" height="56" rx="6" stroke="#ad1457"/>
      <rect x="384" y="30" width="58" height="56" rx="6" stroke="#1565c0"/>
      <rect x="450" y="30" width="58" height="56" rx="6" stroke="#6a1b9a"/>
      <rect x="516" y="30" width="58" height="56" rx="6" stroke="#00838f"/>
      <rect x="582" y="30" width="58" height="56" rx="6" stroke="#ad1457"/>
      <rect x="648" y="30" width="58" height="56" rx="6" stroke="#1565c0"/>
      <rect x="714" y="30" width="58" height="56" rx="6" stroke="#6a1b9a"/>
    </g>
    <g fill="#263238">
      <text x="149" y="64">10</text>
      <text x="215" y="64">9</text>
      <text x="281" y="64">8</text>
      <text x="347" y="64">7</text>
      <text x="413" y="64">6</text>
      <text x="479" y="64">5</text>
      <text x="545" y="64">4</text>
      <text x="611" y="64">3</text>
      <text x="677" y="64">2</text>
      <text x="743" y="64">1</text>
    </g>

    <!-- Row 2: after increment-4 pass -->
    <g stroke-width="2.5" fill="#ffffff">
      <rect x="120" y="150" width="58" height="56" rx="6" stroke="#1565c0"/>
      <rect x="186" y="150" width="58" height="56" rx="6" stroke="#6a1b9a"/>
      <rect x="252" y="150" width="58" height="56" rx="6" stroke="#00838f"/>
      <rect x="318" y="150" width="58" height="56" rx="6" stroke="#ad1457"/>
      <rect x="384" y="150" width="58" height="56" rx="6" stroke="#1565c0"/>
      <rect x="450" y="150" width="58" height="56" rx="6" stroke="#6a1b9a"/>
      <rect x="516" y="150" width="58" height="56" rx="6" stroke="#00838f"/>
      <rect x="582" y="150" width="58" height="56" rx="6" stroke="#ad1457"/>
      <rect x="648" y="150" width="58" height="56" rx="6" stroke="#1565c0"/>
      <rect x="714" y="150" width="58" height="56" rx="6" stroke="#6a1b9a"/>
    </g>
    <g fill="#263238">
      <text x="149" y="184">2</text>
      <text x="215" y="184">1</text>
      <text x="281" y="184">4</text>
      <text x="347" y="184">3</text>
      <text x="413" y="184">6</text>
      <text x="479" y="184">5</text>
      <text x="545" y="184">8</text>
      <text x="611" y="184">7</text>
      <text x="677" y="184">10</text>
      <text x="743" y="184">9</text>
    </g>

    <!-- Row 3: final, after increment-1 pass -->
    <g stroke-width="1.5" fill="#ffffff" stroke="#455a64">
      <rect x="120" y="270" width="58" height="56" rx="6"/>
      <rect x="186" y="270" width="58" height="56" rx="6"/>
      <rect x="252" y="270" width="58" height="56" rx="6"/>
      <rect x="318" y="270" width="58" height="56" rx="6"/>
      <rect x="384" y="270" width="58" height="56" rx="6"/>
      <rect x="450" y="270" width="58" height="56" rx="6"/>
      <rect x="516" y="270" width="58" height="56" rx="6"/>
      <rect x="582" y="270" width="58" height="56" rx="6"/>
      <rect x="648" y="270" width="58" height="56" rx="6"/>
      <rect x="714" y="270" width="58" height="56" rx="6"/>
    </g>
    <g fill="#263238">
      <text x="149" y="304">1</text>
      <text x="215" y="304">2</text>
      <text x="281" y="304">3</text>
      <text x="347" y="304">4</text>
      <text x="413" y="304">5</text>
      <text x="479" y="304">6</text>
      <text x="545" y="304">7</text>
      <text x="611" y="304">8</text>
      <text x="677" y="304">9</text>
      <text x="743" y="304">10</text>
    </g>
  </g>

  <!-- legend -->
  <g font-size="12.5" fill="#546e7a">
    <line x1="120" y1="365" x2="146" y2="365" stroke="#1565c0" stroke-width="2.5"/>
    <text x="152" y="369">indices 0, 4, 8</text>
    <line x1="300" y1="365" x2="326" y2="365" stroke="#6a1b9a" stroke-width="2.5"/>
    <text x="332" y="369">indices 1, 5, 9</text>
    <line x1="480" y1="365" x2="506" y2="365" stroke="#00838f" stroke-width="2.5"/>
    <text x="512" y="369">indices 2, 6</text>
    <line x1="630" y1="365" x2="656" y2="365" stroke="#ad1457" stroke-width="2.5"/>
    <text x="662" y="369">indices 3, 7</text>
    <text x="120" y="392" fill="#78909c">Same-colored cells are 4 apart and get sorted, by straight insertion, as one subsequence.</text>
  </g>
</svg>
