<svg viewBox="0 0 780 360" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <defs>
    <marker id="idx-arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#607d8b"/>
    </marker>
  </defs>

  <!-- column headers -->
  <g font-size="13" fill="#455a64" text-anchor="middle">
    <text x="135" y="24">original array</text>
    <text x="295" y="24">index table</text>
    <text x="455" y="24">rank table</text>
    <text x="615" y="24">sorted array</text>
  </g>

  <!-- connecting arrows from index table entries back to the original array position they point to -->
  <g stroke="#607d8b" stroke-width="1.5" fill="none" marker-end="url(#idx-arrow)">
    <path d="M260,78 C210,78 220,276 170,276"/>
    <path d="M260,144 C210,144 220,144 170,144"/>
    <path d="M260,210 C210,210 220,78 170,78"/>
    <path d="M260,276 C210,276 220,210 170,210"/>
  </g>

  <g font-family="'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" text-anchor="middle">
    <!-- original array column -->
    <g fill="#ffffff" stroke="#455a64" stroke-width="1.5">
      <rect x="100" y="50"  width="70" height="56" rx="6"/>
      <rect x="100" y="116" width="70" height="56" rx="6"/>
      <rect x="100" y="182" width="70" height="56" rx="6"/>
      <rect x="100" y="248" width="70" height="56" rx="6"/>
    </g>
    <g fill="#263238">
      <text x="135" y="84">5.0</text>
      <text x="135" y="150">3.0</text>
      <text x="135" y="216">8.0</text>
      <text x="135" y="282">1.0</text>
    </g>

    <!-- index table column -->
    <g fill="#fff8e1" stroke="#f9a825" stroke-width="1.5">
      <rect x="260" y="50"  width="70" height="56" rx="6"/>
      <rect x="260" y="116" width="70" height="56" rx="6"/>
      <rect x="260" y="182" width="70" height="56" rx="6"/>
      <rect x="260" y="248" width="70" height="56" rx="6"/>
    </g>
    <g fill="#263238">
      <text x="295" y="84">3</text>
      <text x="295" y="150">1</text>
      <text x="295" y="216">0</text>
      <text x="295" y="282">2</text>
    </g>

    <!-- rank table column -->
    <g fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5">
      <rect x="420" y="50"  width="70" height="56" rx="6"/>
      <rect x="420" y="116" width="70" height="56" rx="6"/>
      <rect x="420" y="182" width="70" height="56" rx="6"/>
      <rect x="420" y="248" width="70" height="56" rx="6"/>
    </g>
    <g fill="#263238">
      <text x="455" y="84">2</text>
      <text x="455" y="150">1</text>
      <text x="455" y="216">3</text>
      <text x="455" y="282">0</text>
    </g>

    <!-- sorted array column -->
    <g fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5">
      <rect x="580" y="50"  width="70" height="56" rx="6"/>
      <rect x="580" y="116" width="70" height="56" rx="6"/>
      <rect x="580" y="182" width="70" height="56" rx="6"/>
      <rect x="580" y="248" width="70" height="56" rx="6"/>
    </g>
    <g fill="#263238">
      <text x="615" y="84">1.0</text>
      <text x="615" y="150">3.0</text>
      <text x="615" y="216">5.0</text>
      <text x="615" y="282">8.0</text>
    </g>
  </g>

  <!-- row position markers, shared across all four columns -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#90a4ae" text-anchor="middle">
    <g>
      <circle cx="135" cy="118" r="0" fill="none"/>
    </g>
    <text x="135" y="70">0</text><text x="295" y="70">0</text><text x="455" y="70">0</text><text x="615" y="70">0</text>
    <text x="135" y="136">1</text><text x="295" y="136">1</text><text x="455" y="136">1</text><text x="615" y="136">1</text>
    <text x="135" y="202">2</text><text x="295" y="202">2</text><text x="455" y="202">2</text><text x="615" y="202">2</text>
    <text x="135" y="268">3</text><text x="295" y="268">3</text><text x="455" y="268">3</text><text x="615" y="268">3</text>
  </g>

  <text x="390" y="330" text-anchor="middle" font-size="12.5" fill="#78909c">
    sortWithIndices(values) fills the index table so that values[index[j]] is the j-th smallest; the rank table is its inverse.
  </text>
</svg>
